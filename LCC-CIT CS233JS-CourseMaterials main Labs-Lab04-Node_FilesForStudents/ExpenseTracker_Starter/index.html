<!-- Starter file for ExpenseTracker lab. -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expense Tracker</title>
  <!-- Bootstrap CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- App header -->
  <div class="navbar navbar-expand-sm bg-dark">
    <div class="container-fluid">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link text-white" href="#">Expense Tracker</a>
        </li>
      </ul>
    </div>
  </div>
  <div class="container mt-4">
    <div class="row">
      <div class="col-sm-2"></div>
      <div class="col-sm-8">
        <h2>Expenses</h2>

        <form class="expense-form mb-4">
          <div class="row">
            <div class="col-sm-6 mb-2">
              <input id="description" type="text" class="form-control" placeholder="Expense Description" required>
            </div>
            <div class="col-sm-4 mb-2">
              <input id="amount" type="number" step="0.01" class="form-control" placeholder="Amount ($)" required>
            </div>
            <div class="col-sm-2 mb-2">
              <button type="submit" class="btn btn-primary w-100">Add</button>
            </div>
          </div>
        </form>

        <div class="expense-list list-group"></div>
      </div>
      <div class="col-sm-2"></div>
    </div>
  </div>

  <script src="expensetracker.js"></script>
</body>
</html>
