<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book List</title>
  <!-- Bootstrap CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="navbar navbar-expand-sm bg-dark">
    <div class="container-fluid">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link text-white" href="#">My Book List</a>
        </li>
      </ul>
    </div>
  </div>
  <div class="container">
    <div class="row content-area">
      <div class="col-sm-2"></div>
      <div class="col-sm-8">
        <h2>Book List</h2>

        <div class="row input-area">
          <div class="col-sm-1"></div>
          <div class="form-group col-sm-4">
            <label for="addTitle" class="form-label">Title</label>
            <input type="text" placeholder="Book Title" class="form-control" id="addTitle">
          </div>
          <div class="form-group col-sm-4">
            <label for="addAuthor" class="form-label">Author</label>
            <input type="text" placeholder="Author" class="form-control" id="addAuthor">
          </div>
          <div class="form-group col-sm-2 d-flex align-items-end">
            <button id="addButton" class="btn btn-primary w-100">Add</button>
          </div>
          <div class="col-sm-1"></div>
        </div>

        <ul class="list-group" id="bookList"></ul>
      </div>
      <div class="col-sm-2"></div>
    </div>
  </div>

  <script src="booklist.js"></script>
</body>
</html>
