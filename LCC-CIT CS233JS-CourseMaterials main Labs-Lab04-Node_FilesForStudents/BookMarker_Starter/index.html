<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Web Bookmarker</title>
  <!-- Bootstrap CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="overlay"></div>

  <!-- URL and description are required by HTML form validation. -->
  <div class="floater content">
    <form class="bookmark-form">
      <div class="floater-top">
        <input id="url" type="url" class="form-control" placeholder="Web address" required>
        <input id="description" type="text" class="form-control" placeholder="Description" required>
      </div>
      <div class="floater-bottom">
        <button type="submit" class="btn btn-primary btn-sm">Add</button>
      </div>
    </form>
  </div>

  <!-- JS renders bookmark rows into this container. -->
  <div class="bookmarks-list"></div>

  <script src="bookmarker.js"></script>
</body>
</html>
